<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgRadar V3 — Inteligencia de mercados y agronomía</title>
  <meta name="description" content="AgRadar — plataforma premium de inteligencia de mercados, insumos, NDVI, rinde estimado, macro y cobertura para el agro argentino." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#07090B;
      --bg2:#0A0E12;
      --panel:rgba(15,22,29,.72);
      --panel2:rgba(12,17,23,.88);
      --glass:rgba(255,255,255,.055);
      --line:rgba(255,255,255,.105);
      --line2:rgba(79,224,168,.18);
      --text:#F3F7F6;
      --muted:#8D9BA4;
      --muted2:#B7C3C5;
      --mint:#4FE0A8;
      --mint2:#94F7CE;
      --cyan:#6EE7FF;
      --amber:#FFD166;
      --orange:#FF9B54;
      --red:#FF6B6B;
      --green:#68F5B3;
      --blue:#8AB4FF;
      --violet:#B89CFF;
      --shadow:0 24px 80px rgba(0,0,0,.44);
      --radius:24px;
      --radius2:16px;
      --sidebar:286px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      background:
        radial-gradient(circle at 18% -5%, rgba(79,224,168,.18), transparent 32%),
        radial-gradient(circle at 88% 8%, rgba(110,231,255,.10), transparent 26%),
        radial-gradient(circle at 50% 115%, rgba(184,156,255,.09), transparent 30%),
        linear-gradient(180deg,#07090B 0%, #090C10 42%, #050607 100%);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      min-height:100vh;
      overflow-x:hidden;
    }
    body:before{
      content:"";
      position:fixed; inset:0; pointer-events:none; z-index:-1;
      background-image:linear-gradient(rgba(255,255,255,.028) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.028) 1px,transparent 1px);
      background-size:48px 48px;
      mask-image:linear-gradient(to bottom,rgba(0,0,0,.9),rgba(0,0,0,.15));
    }
    a{color:inherit;text-decoration:none}
    button,input,select{font:inherit}
    button{cursor:pointer}
    .app{display:flex;min-height:100vh;width:100%}
    .sidebar{
      width:var(--sidebar); position:fixed; left:0; top:0; bottom:0; padding:22px 18px;
      border-right:1px solid var(--line); background:rgba(5,8,10,.64); backdrop-filter:blur(28px); z-index:10;
      display:flex; flex-direction:column; gap:18px;
    }
    .brand{display:flex; align-items:center; gap:12px; padding:8px 10px 16px; border-bottom:1px solid rgba(255,255,255,.075)}
    .logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--mint),#0C6F55);box-shadow:0 0 36px rgba(79,224,168,.23);position:relative;overflow:hidden}
    .logo:after{content:""; position:absolute; inset:8px; border-radius:50%; border:2px solid rgba(7,9,11,.8); box-shadow:0 0 0 6px rgba(7,9,11,.18)}
    .brand h1{font-family:"Space Grotesk"; font-size:24px; margin:0; letter-spacing:-.04em; line-height:1}
    .brand small{display:block; color:var(--muted); font-size:11px; letter-spacing:.06em; text-transform:uppercase; margin-top:4px}
    .nav{display:flex; flex-direction:column; gap:6px; padding:4px}
    .nav button{
      border:1px solid transparent; background:transparent; color:var(--muted2); padding:11px 12px; border-radius:14px;
      display:flex; align-items:center; justify-content:space-between; transition:.22s ease; text-align:left;
    }
    .nav button:hover{background:rgba(255,255,255,.055); color:var(--text); border-color:rgba(255,255,255,.08); transform:translateX(2px)}
    .nav button.active{background:linear-gradient(135deg,rgba(79,224,168,.17),rgba(79,224,168,.045)); color:var(--text); border-color:rgba(79,224,168,.24); box-shadow:inset 0 1px rgba(255,255,255,.07)}
    .nav .icon{width:22px;display:inline-block;margin-right:10px;opacity:.92}
    .pill{display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line); border-radius:999px; padding:5px 9px; color:var(--muted2); background:rgba(255,255,255,.04); font-size:11px; white-space:nowrap}
    .pill.live{color:var(--mint2); border-color:rgba(79,224,168,.32); background:rgba(79,224,168,.08)}
    .pill.fallback{color:var(--amber); border-color:rgba(255,209,102,.32); background:rgba(255,209,102,.07)}
    .pill.manual{color:var(--blue); border-color:rgba(138,180,255,.3); background:rgba(138,180,255,.07)}
    .pill.pending{color:#c9a7ff; border-color:rgba(184,156,255,.32); background:rgba(184,156,255,.07)}
    .sidebar-footer{margin-top:auto; display:flex; flex-direction:column; gap:10px; padding:14px; border:1px solid var(--line); border-radius:20px; background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.025))}
    .login-row{display:flex; gap:8px; flex-wrap:wrap}
    .login-btn{flex:1; min-width:92px; border:1px solid var(--line); border-radius:12px; background:rgba(255,255,255,.06); color:var(--text); padding:9px 10px; transition:.2s}
    .login-btn:hover{border-color:rgba(79,224,168,.35); background:rgba(79,224,168,.08)}
    .main{margin-left:var(--sidebar); width:calc(100% - var(--sidebar)); padding:24px 26px 60px}
    .topbar{position:sticky; top:0; z-index:8; margin:-24px -26px 22px; padding:18px 26px; background:linear-gradient(180deg,rgba(7,9,11,.92),rgba(7,9,11,.65)); backdrop-filter:blur(24px); border-bottom:1px solid rgba(255,255,255,.06); display:flex; align-items:center; justify-content:space-between; gap:14px}
    .hero{display:grid; grid-template-columns:minmax(0,1.6fr) minmax(320px,.9fr); gap:18px; margin-bottom:18px}
    .panel{
      border:1px solid var(--line); background:linear-gradient(180deg,rgba(255,255,255,.068),rgba(255,255,255,.028));
      border-radius:var(--radius); box-shadow:var(--shadow); backdrop-filter:blur(24px); overflow:hidden; position:relative;
    }
    .panel:before{content:""; position:absolute; inset:0; pointer-events:none; border-radius:inherit; background:linear-gradient(135deg,rgba(255,255,255,.12),transparent 28%,rgba(79,224,168,.03)); opacity:.7}
    .panel-inner{position:relative; z-index:1; padding:22px}
    .hero-title{font-family:"Space Grotesk"; font-weight:700; letter-spacing:-.055em; font-size:46px; line-height:.98; margin:0 0 12px}
    .hero-title span{color:var(--mint); text-shadow:0 0 28px rgba(79,224,168,.22)}
    .lead{color:var(--muted2); font-size:15px; line-height:1.55; max-width:820px; margin:0 0 20px}
    .quick-grid{display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px}
    .kpi-card{border:1px solid rgba(255,255,255,.085); background:rgba(6,10,13,.58); border-radius:18px; padding:14px; min-height:94px; transition:.22s}
    .kpi-card:hover{transform:translateY(-2px); border-color:rgba(79,224,168,.22); background:rgba(8,14,18,.78)}
    .kpi-label{display:flex; align-items:center; justify-content:space-between; gap:10px; color:var(--muted); font-size:12px; margin-bottom:8px}
    .kpi-value{font-family:"Space Grotesk"; font-size:25px; letter-spacing:-.04em; font-weight:700}
    .kpi-sub{font-size:12px;color:var(--muted);margin-top:4px}
    .section{margin:22px 0 8px; scroll-margin-top:90px}
    .section-head{display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin:20px 2px 12px}
    .section h2{font-family:"Space Grotesk"; font-size:26px; letter-spacing:-.04em; margin:0}
    .section p{color:var(--muted); margin:6px 0 0; line-height:1.5; font-size:13px}
    .grid{display:grid; gap:14px}
    .grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid.four{grid-template-columns:repeat(4,minmax(0,1fr))}
    .card{border:1px solid var(--line); border-radius:20px; background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.022)); backdrop-filter:blur(18px); padding:18px; box-shadow:0 16px 50px rgba(0,0,0,.23); position:relative; overflow:hidden}
    .card.soft{background:rgba(255,255,255,.035)}
    .card h3{font-family:"Space Grotesk"; font-size:18px; letter-spacing:-.025em; margin:0 0 6px}
    .card h4{font-size:13px; margin:0 0 8px; color:var(--muted2); letter-spacing:.01em}
    .muted{color:var(--muted)}
    .small{font-size:12px; line-height:1.45}
    .big-num{font-family:"Space Grotesk"; font-size:34px; letter-spacing:-.055em; font-weight:700}
    .value-row{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,.065)}
    .value-row:last-child{border-bottom:0}
    .badge-row{display:flex; gap:7px; flex-wrap:wrap; align-items:center}
    .btn{border:1px solid var(--line); background:rgba(255,255,255,.055); color:var(--text); padding:10px 13px; border-radius:14px; transition:.22s; display:inline-flex; align-items:center; justify-content:center; gap:8px; font-weight:600}
    .btn:hover{transform:translateY(-1px); border-color:rgba(79,224,168,.35); background:rgba(79,224,168,.09)}
    .btn.primary{border-color:rgba(79,224,168,.42); background:linear-gradient(135deg,rgba(79,224,168,.24),rgba(79,224,168,.08)); color:#EFFFF8; box-shadow:0 0 0 1px rgba(79,224,168,.06), 0 18px 42px rgba(79,224,168,.08)}
    .btn.warn{border-color:rgba(255,209,102,.32); background:rgba(255,209,102,.08)}
    .control-grid{display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; margin-top:12px}
    label{display:block; color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.08em; margin:0 0 6px}
    input,select{width:100%; border:1px solid rgba(255,255,255,.105); background:rgba(5,8,10,.72); color:var(--text); border-radius:13px; padding:11px 12px; outline:none; transition:.2s}
    input:focus,select:focus{border-color:rgba(79,224,168,.42); box-shadow:0 0 0 4px rgba(79,224,168,.07)}
    input[type=range]{padding:0; accent-color:var(--mint)}
    table{width:100%; border-collapse:separate; border-spacing:0; overflow:hidden; border-radius:16px; border:1px solid rgba(255,255,255,.075)}
    th,td{padding:12px 12px; border-bottom:1px solid rgba(255,255,255,.065); font-size:13px; vertical-align:top}
    th{text-align:left; color:var(--muted); background:rgba(255,255,255,.035); font-size:11px; text-transform:uppercase; letter-spacing:.07em}
    tr:last-child td{border-bottom:0}
    .sign{display:inline-flex; width:24px; height:24px; border-radius:8px; align-items:center; justify-content:center; font-weight:800; border:1px solid var(--line)}
    .sign.plus{color:var(--mint); background:rgba(79,224,168,.09); border-color:rgba(79,224,168,.28)}
    .sign.minus{color:var(--red); background:rgba(255,107,107,.08); border-color:rgba(255,107,107,.26)}
    .sign.equal{color:var(--amber); background:rgba(255,209,102,.08); border-color:rgba(255,209,102,.24)}
    .verdict{border-radius:18px; padding:18px; border:1px solid rgba(255,255,255,.10); background:linear-gradient(135deg,rgba(79,224,168,.14),rgba(255,255,255,.025)); position:relative; overflow:hidden}
    .verdict .label{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.1em}
    .verdict .v{font-family:"Space Grotesk"; font-size:30px; letter-spacing:-.04em; margin:4px 0}
    .meter{height:11px; background:rgba(255,255,255,.08); border-radius:999px; overflow:hidden; border:1px solid rgba(255,255,255,.06)}
    .meter span{display:block; height:100%; border-radius:999px; background:linear-gradient(90deg,var(--red),var(--amber),var(--mint)); transition:.35s}
    .chart-box{height:260px; position:relative}
    .heatmap{display:grid; gap:6px; overflow:auto; padding-bottom:4px}
    .heat-row{display:grid; grid-template-columns:110px repeat(8, minmax(54px,1fr)); gap:6px; align-items:center}
    .heat-cell{height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; border:1px solid rgba(255,255,255,.07); font-size:12px; color:#fff; position:relative}
    .heat-label{color:var(--muted2);font-size:12px;white-space:nowrap}
    .sat-card{min-height:300px; background:radial-gradient(circle at 25% 18%, rgba(79,224,168,.24), transparent 16%),radial-gradient(circle at 70% 35%, rgba(255,209,102,.16), transparent 13%),radial-gradient(circle at 62% 75%, rgba(110,231,255,.16), transparent 16%),linear-gradient(145deg,#102016,#091117); border-radius:20px; border:1px solid rgba(79,224,168,.20); position:relative; overflow:hidden}
    .sat-card:before{content:"";position:absolute;inset:0;background-image:linear-gradient(35deg,transparent 0 38%,rgba(255,255,255,.08) 39%,transparent 42% 100%),linear-gradient(100deg,rgba(0,0,0,.18),transparent); opacity:.78}
    .sat-card:after{content:"NDVI / EVI anomaly model"; position:absolute; left:18px; bottom:18px; color:rgba(255,255,255,.72); font-size:12px; letter-spacing:.05em; text-transform:uppercase}
    .layer-dot{position:absolute; width:12px; height:12px; border-radius:999px; background:var(--mint); box-shadow:0 0 0 8px rgba(79,224,168,.12),0 0 26px rgba(79,224,168,.7)}
    .dot1{left:28%; top:35%}.dot2{left:54%; top:48%; background:var(--amber); box-shadow:0 0 0 8px rgba(255,209,102,.12),0 0 22px rgba(255,209,102,.6)}.dot3{left:72%; top:66%; background:var(--red); box-shadow:0 0 0 8px rgba(255,107,107,.11),0 0 22px rgba(255,107,107,.55)}
    .explain{border:1px solid rgba(79,224,168,.17); background:rgba(79,224,168,.045); border-radius:16px; padding:13px; color:var(--muted2); line-height:1.5}
    details{border:1px solid rgba(255,255,255,.085); background:rgba(255,255,255,.033); border-radius:16px; padding:12px 14px; color:var(--muted2)}
    summary{cursor:pointer; color:var(--text); font-weight:700; font-size:13px}
    .source-list{display:flex; flex-direction:column; gap:8px; max-height:320px; overflow:auto; padding-right:4px}
    .source-item{display:flex; justify-content:space-between; gap:12px; border:1px solid rgba(255,255,255,.08); border-radius:14px; padding:10px; background:rgba(255,255,255,.03)}
    .source-item b{font-size:12px}.source-item span{font-size:11px;color:var(--muted)}
    .toast{position:fixed; right:22px; bottom:22px; background:rgba(9,14,18,.94); border:1px solid rgba(79,224,168,.3); box-shadow:var(--shadow); border-radius:18px; padding:14px 16px; z-index:99; display:none; max-width:360px}
    .toast.show{display:block; animation:pop .25s ease}
    @keyframes pop{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
    .skeleton{position:relative; overflow:hidden; background:rgba(255,255,255,.055); border-radius:12px}
    .skeleton:after{content:"";position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);animation:shimmer 1.4s infinite}
    @keyframes shimmer{100%{transform:translateX(100%)}}
    .mobile-toggle{display:none}
    .print-report{display:none}
    @media(max-width:1100px){
      .hero,.grid.two,.grid.three,.grid.four{grid-template-columns:1fr}
      .quick-grid,.control-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .chart-box{height:220px}
    }
    @media(max-width:760px){
      .sidebar{transform:translateX(-101%); transition:.25s; width:286px}
      .sidebar.open{transform:translateX(0)}
      .main{margin-left:0; width:100%; padding:20px 14px 50px}
      .topbar{margin:-20px -14px 18px; padding:14px}
      .hero-title{font-size:36px}
      .quick-grid,.control-grid{grid-template-columns:1fr}
      .mobile-toggle{display:inline-flex}
      .heat-row{grid-template-columns:88px repeat(8, 54px)}
    }
    @media print{
      body{background:#fff;color:#111}.sidebar,.topbar,.btn,.nav{display:none!important}.main{margin:0;width:100%;padding:0}.panel,.card{box-shadow:none;background:#fff;color:#111;border-color:#ddd}.muted,.small{color:#333}.print-report{display:block}.no-print{display:none!important}
    }
  </style>
</head>
<body>
  <div id="root">
    <div style="min-height:100vh;display:grid;place-items:center;padding:24px;background:#07090B;color:#F3F7F6;font-family:Inter,system-ui">
      <div style="max-width:620px;border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:26px;background:rgba(255,255,255,.05);box-shadow:0 24px 80px rgba(0,0,0,.44)">
        <div style="font-family:Space Grotesk;font-size:30px;font-weight:700;letter-spacing:-.04em">AgRadar V3 está cargando…</div>
        <p style="color:#8D9BA4;line-height:1.55">Si esta pantalla no cambia, el navegador no pudo cargar React/Chart.js desde CDN. Subilo a GitHub Pages y abrilo por HTTPS; no lo pruebes como archivo local.</p>
      </div>
    </div>
  </div>
  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.7/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script>
    (function(){
      if(!window.React || !window.ReactDOM){
        document.getElementById('root').innerHTML = '<div style="min-height:100vh;display:grid;place-items:center;background:#07090B;color:white;font-family:Inter,system-ui;padding:24px"><div style="max-width:680px;border:1px solid rgba(255,255,255,.14);border-radius:24px;padding:26px;background:rgba(255,255,255,.06)"><h1>AgRadar no pudo iniciar</h1><p style="color:#AAB6BB">No cargó React desde CDN. Probá abrirlo desde GitHub Pages por HTTPS o desactivar bloqueadores de contenido.</p></div></div>';
        return;
      }
      var h = React.createElement;
      var useState = React.useState, useEffect = React.useEffect, useMemo = React.useMemo, useRef = React.useRef;
      var money = new Intl.NumberFormat('es-AR',{maximumFractionDigits:0});
      var one = new Intl.NumberFormat('es-AR',{maximumFractionDigits:1,minimumFractionDigits:1});
      var two = new Intl.NumberFormat('es-AR',{maximumFractionDigits:2,minimumFractionDigits:2});
      var pct = function(n){ return (n>=0?'+':'') + one.format(n) + '%'; };
      var clamp = function(n,a,b){ return Math.max(a, Math.min(b,n)); };
      var nowLabel = function(){ return new Date().toLocaleString('es-AR',{dateStyle:'short',timeStyle:'short'}); };
      var safeJson = function(key, fallback){ try{ return JSON.parse(localStorage.getItem(key)) || fallback; }catch(e){ return fallback; } };
      var store = function(key,val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){} };
      var toast = function(msg){ var el=document.getElementById('toast'); el.innerHTML=msg; el.className='toast show'; setTimeout(function(){el.className='toast'},3800); };
      var Badge = function(props){ return h('span',{className:'pill '+(props.type||'')},props.children); };
      var Button = function(props){ return h('button',{className:'btn '+(props.kind||''), onClick:props.onClick, type:'button'},props.children); };
      var Card = function(props){ return h('div',{className:'card '+(props.className||'')},props.children); };
      var Kpi = function(p){ return h('div',{className:'kpi-card'},[
        h('div',{className:'kpi-label',key:'l'},[h('span',null,p.label),p.badge||null]),
        h('div',{className:'kpi-value',key:'v'},p.value),
        h('div',{className:'kpi-sub',key:'s'},p.sub)
      ]); };
      var DataBadge = function(p){ return h(Badge,{type:p.status==='LIVE'?'live':p.status==='FALLBACK'?'fallback':p.status==='MANUAL'?'manual':'pending'},p.status); };

      var FALLBACK = {
        dollars:{oficial:1185, blue:1245, mep:1232, ccl:1260, source:'Fallback interno', status:'FALLBACK', updated:nowLabel()},
        macro:{risk:680,dxy:98.7,us10y:4.28,inflation:2.1,pesoRate:38.0,caucion:34.0,wti:65.4,retMaiz:12,retSoja:33,retTrigo:9,status:'FALLBACK',updated:nowLabel()},
        grains:[
          {crop:'Maíz disponible', price:178, future:184, basis:-6, unit:'USD/t', source:'Manual / estructura BCR', status:'MANUAL'},
          {crop:'Soja disponible', price:302, future:310, basis:-8, unit:'USD/t', source:'Manual / estructura BCR', status:'MANUAL'},
          {crop:'Trigo disponible', price:198, future:205, basis:-7, unit:'USD/t', source:'Manual / estructura BCR', status:'MANUAL'}
        ],
        inputs:{urea:580, ureaSource:'IF / San Nicolás - manual', parity:545, corn:178, histRatio:2.75, trend:'alcista', supply:'ajustado'},
        weather:{temp:18.2, rain7:14, rain30:42, soil1:0.18, soil3:0.20, soil9:0.22, status:'FALLBACK', updated:nowLabel()}
      };

      var THRESHOLDS = {
        'Maíz':{
          'Emergencia':{base:[0.18,0.32], evi:[0.10,0.22]}, 'Vegetativo':{base:[0.58,0.78], evi:[0.35,0.55]}, 'Floración':{base:[0.72,0.88], evi:[0.48,0.68]}, 'Llenado':{base:[0.62,0.82], evi:[0.38,0.58]}

      function recommend(inputs, dollars, macro){
        var urea = Number(inputs.urea)||0, parity=Number(inputs.parity)||0, corn=Number(inputs.corn)||0, hist=Number(inputs.histRatio)||1;
        var parityGap = parity ? ((urea-parity)/parity)*100 : 0;
        var ratio = corn ? urea/corn : 0;
        var ratioGap = hist ? ((ratio-hist)/hist)*100 : 0;
        var fxGap = dollars.oficial ? ((dollars.ccl-dollars.oficial)/dollars.oficial)*100 : 0;
        var factors = [];
        function factor(name, weight, sign, current, bench, why){
          var value = sign==='+' ? weight : sign==='-' ? -weight : 0;
          factors.push({name:name, weight:weight, sign:sign, current:current, bench:bench, impact:value, why:why});
        }
        factor('Brecha de paridad importación',1.4,
          parityGap<=-3?'+':parityGap>=5?'-':'=',
          'Urea local '+money.format(urea)+' USD/t vs paridad '+money.format(parity)+' USD/t',
          pct(parityGap)+' vs paridad',
          parityGap<=-3?'El precio local está debajo de la reposición importada: riesgo de suba si se normaliza la paridad.':parityGap>=5?'El precio local está por arriba de la paridad: no hay urgencia económica salvo riesgo de disponibilidad.':'El precio local está cerca de paridad: señal neutra.'
        );
        factor('Relación insumo/grano histórica',1.3,
          ratioGap<=-5?'+':ratioGap>=10?'-':'=',
          two.format(ratio)+' t maíz / t urea',
          'Histórico '+two.format(hist)+' · desvío '+pct(ratioGap),
          ratioGap<=-5?'La urea está barata contra maíz respecto de la historia: favorece fijar insumo.':ratioGap>=10?'La urea está cara contra maíz: comprar todo hoy destruye margen relativo.':'La relación está cerca de su zona normal.'
        );
        var trendSign = inputs.trend==='alcista'?'+':inputs.trend==='bajista'?'-':'=';
        factor('Tendencia internacional',0.85,trendSign,
          inputs.trend==='alcista'?'Urea/energía con sesgo alcista':inputs.trend==='bajista'?'Urea/energía con sesgo bajista':'Sin tendencia clara',
          'Peso 0.8–0.9',
          trendSign==='+'?'Si la tendencia externa sube, esperar aumenta el riesgo de reposición.':trendSign==='-'?'Si la tendencia externa baja, conviene escalonar y no apurarse.':'No define la decisión.'
        );
        var sdSign = inputs.supply==='ajustado'?'+':inputs.supply==='holgado'?'-':'=';
        factor('Oferta / demanda local',0.9,sdSign,
          inputs.supply==='ajustado'?'Mercado local ajustado':inputs.supply==='holgado'?'Oferta cómoda':'Oferta normal',
          'Lectura comercial',
          sdSign==='+'?'Riesgo de disponibilidad/precio por demanda o logística.':sdSign==='-'?'No hay presión de abastecimiento; permite esperar mejores niveles.':'No suma ni resta fuerte.'
        );
        var favorable = factors.filter(function(f){return f.sign==='+'}).length;
        var negative = factors.filter(function(f){return f.sign==='-'}).length;
        var bonus = favorable>=2 ? 0.6 : 0;
        var penalty = negative>=2 ? -0.35 : 0;
        var macroAdj = fxGap>12 ? 0.25 : fxGap<5 ? -0.15 : 0;
        var raw = 5 + factors.reduce(function(a,b){return a+b.impact},0) + bonus + penalty + macroAdj;
        var score = clamp(raw,0,10);
        var verdict = score>=7.4?'ABASTECERSE YA':score>=6.1?'COMPRA SELECTIVA':score>=4.8?'NEUTRAL':score>=3.2?'SOLO LO INDISPENSABLE':'ESPERAR';
        var color = score>=7.4?'var(--mint)':score>=6.1?'var(--green)':score>=4.8?'var(--amber)':score>=3.2?'var(--orange)':'var(--red)';
        var confidence = clamp(62 + favorable*6 - Math.abs(negative-favorable)*3 + (dollars.status==='LIVE'?8:0),45,88);
        return {score:score, verdict:verdict, color:color, factors:factors, bonus:bonus, penalty:penalty, macroAdj:macroAdj, parityGap:parityGap, ratio:ratio, ratioGap:ratioGap, fxGap:fxGap, confidence:confidence};
      }

      function estimateYield(ndvi,evi,crop,stage,region,weather,soilMo,ret){
        var t = THRESHOLDS[crop][stage] || Object.values(THRESHOLDS[crop])[0];
        var adj = regionAdj[region] || 0;
        var low = t.base[0]+adj, high = t.base[1]+adj, mid = (low+high)/2;
        var eLow=t.evi[0]+adj*.7, eHigh=t.evi[1]+adj*.7, eMid=(eLow+eHigh)/2;
        var ndviAnom = ((ndvi-mid)/mid)*100;
        var eviAnom = ((evi-eMid)/eMid)*100;
        var soilScore = clamp((weather.soil9 || 0.2) / 0.24, .65, 1.18);
        var rainScore = clamp((weather.rain30 || 40) / 55, .65, 1.25);
        var soilProfile = soilProfiles[region] || soilProfiles['Córdoba'];
        var moAdj = (soilMo - soilProfile.mo) * 0.015;
        var waterAdj = ((soilScore-1)*0.16) + ((rainScore-1)*0.10);
        var satAdj = (ndviAnom*0.0075) + (eviAnom*0.004);
        var b = baseYield[region][crop] || 60;
        var p50 = clamp(b * (1 + satAdj + waterAdj + moAdj - (ret/100)*0.04), b*.55, b*1.25);
        var uncertainty = 0.10 + Math.max(0, Math.abs(ndviAnom)/100)*0.09 + (weather.status==='LIVE'?0:0.05);
        return {low:low,high:high,mid:mid,eLow:eLow,eHigh:eHigh,ndviAnom:ndviAnom,eviAnom:eviAnom,soilScore:soilScore,rainScore:rainScore,p50:p50,p10:p50*(1-uncertainty),p90:p50*(1+uncertainty),uncertainty:uncertainty, soil:soilProfile,
          status: ndvi<low?'ANOMALÍA NEGATIVA':ndvi>high?'ANOMALÍA POSITIVA':'NORMAL',
          main: ndvi<low?'La cobertura/actividad vegetal está por debajo del umbral esperado para cultivo-etapa-región.':ndvi>high?'La señal satelital supera el rango normal; buen vigor o posible efecto de fecha/variedad.':'El índice está dentro del rango normal esperado.'};
      }
