<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07090B" />

  <style>

      --bg2:#09100f;

    button,input,select{font-family:inherit;color:inherit}
    a{color:inherit;text-decoration:none}
    .boot{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(800px 400px at 20% 10%,rgba(79,224,168,.11),transparent 60%),#07090B}
    .boot-card{width:min(560px,92vw);border:1px solid rgba(255,255,255,.12);border-radius:28px;padding:34px;background:rgba(13,18,22,.82);box-shadow:var(--shadow);backdrop-filter:blur(22px)}

    .boot p{font-size:17px;color:var(--sub);line-height:1.55;margin:0 0 18px}
    .boot-note{padding:16px 18px;border-radius:18px;background:rgba(255,255,255,.055);color:var(--muted);line-height:1.45}
    .dots{display:flex;gap:10px;margin-top:24px}.dots i{width:11px;height:11px;border-radius:50%;background:var(--mint);animation:pulse 1.1s infinite var(--ease)}.dots i:nth-child(2){animation-delay:.18s}.dots i:nth-child(3){animation-delay:.36s}
    @keyframes pulse{0%,100%{opacity:.35;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}
    #app{min-height:100vh}
    .shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
    .sidebar{position:sticky;top:0;height:100vh;padding:22px 18px;border-right:1px solid var(--line);background:rgba(6,10,12,.72);backdrop-filter:blur(24px);z-index:20;display:flex;flex-direction:column}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:28px}.logo-icon{width:42px;height:42px;border-radius:14px;font-size:18px}.brand-title{font-family:"Space Grotesk";font-weight:800;font-size:22px;letter-spacing:-.04em}.brand-sub{font-size:11px;color:var(--muted);margin-top:2px}
    .nav{display:flex;flex-direction:column;gap:6px}.nav button{width:100%;border:0;background:transparent;display:flex;align-items:center;gap:11px;padding:12px 12px;border-radius:13px;color:var(--sub);cursor:pointer;transition:.25s var(--ease);font-size:14px;text-align:left}.nav button:hover{background:rgba(255,255,255,.055);color:#fff}.nav button.active{background:linear-gradient(135deg,rgba(79,224,168,.16),rgba(99,199,255,.07));color:#fff;box-shadow:inset 0 0 0 1px rgba(79,224,168,.18)}.nav svg{opacity:.85;flex:0 0 18px}
    .side-bottom{margin-top:auto;padding-top:18px}.user-chip{display:flex;gap:10px;align-items:center;padding:12px;border-radius:16px;background:rgba(255,255,255,.045);border:1px solid var(--line)}.avatar{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#dffbf2,#4FE0A8);color:#08110f;font-weight:900}.u-name{font-weight:700;font-size:13px}.u-plan{font-size:11px;color:var(--muted);margin-top:2px}
    .main{padding:24px;min-width:0}.topbar{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:22px}.title h1{font-family:"Space Grotesk";font-size:34px;letter-spacing:-.055em;margin:0}.title p{color:var(--muted);margin:6px 0 0;font-size:14px}.actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.pill{display:inline-flex;align-items:center;gap:8px;padding:10px 13px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.055);color:var(--sub);font-size:13px}.live{color:var(--mint);border-color:rgba(79,224,168,.24);background:rgba(79,224,168,.08)}.icon-btn,.primary,.ghost{border:1px solid var(--line);background:rgba(255,255,255,.055);border-radius:13px;min-height:42px;padding:0 14px;cursor:pointer;transition:.22s var(--ease);display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700}.icon-btn{width:42px;padding:0}.primary{border-color:rgba(79,224,168,.34);background:linear-gradient(135deg,rgba(79,224,168,.28),rgba(99,199,255,.12));color:#fff;box-shadow:0 16px 44px rgba(79,224,168,.12)}.ghost:hover,.icon-btn:hover,.primary:hover{transform:translateY(-1px);box-shadow:var(--glow)}

}.bar i{display:block;height:100%;background:linear-gradient(90deg,#ef4444,#facc15,#4FE0A8);border-radius:999px}.section{margin-top:18px}.chart-wrap{height:230px;position:relative}.chart-wrap.tall{height:300px}.alert-list{display:grid;gap:10px}.alert{display:flex;gap:12px;align-items:flex-start;padding:12px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.035)}.dot{width:10px;height:10px;border-radius:50%;margin-top:5px;flex:0 0 10px}.dot.red{background:var(--red)}.dot.yellow{background:var(--yellow)}.dot.green{background:var(--green)}.alert b{font-size:13px}.alert p{margin:4px 0 0;color:var(--muted);font-size:12px;line-height:1.4}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.sum{padding:13px;border-radius:15px;background:rgba(255,255,255,.035);border:1px solid var(--line)}.sum .n{font-size:24px;font-weight:900;margin-top:8px}.sum small{color:var(--muted)}.pos{color:var(--mint)}.neg{color:var(--red)}.warn{color:var(--yellow)}
    .score-layout{display:grid;grid-template-columns:270px 1fr;gap:18px}.score-gauge{display:grid;place-items:center;min-height:260px;border-radius:20px;background:radial-gradient(circle at 50% 50%,rgba(79,224,168,.14),transparent 55%),rgba(255,255,255,.035);border:1px solid var(--line)}.gauge{width:180px;height:180px;border-radius:50%;background:conic-gradient(var(--mint) 0deg,var(--mint) var(--deg),rgba(255,255,255,.08) var(--deg));display:grid;place-items:center;position:relative}.gauge:before{content:"";position:absolute;inset:18px;border-radius:50%;background:#0a0f12;box-shadow:inset 0 0 35px rgba(0,0,0,.7)}.gauge span{position:relative;font-size:46px;font-weight:950;letter-spacing:-.07em}.gauge em{position:relative;display:block;font-size:13px;color:var(--muted);font-style:normal;text-align:center}.verdict{padding:18px;border-radius:20px;border:1px solid rgba(79,224,168,.23);background:linear-gradient(135deg,rgba(79,224,168,.12),rgba(99,199,255,.05))}.verdict .k{color:var(--muted);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em}.verdict h3{margin:8px 0 8px;font-size:24px;letter-spacing:-.035em;color:var(--mint)}.verdict p{color:var(--sub);line-height:1.5;margin:0}.factor-table{margin-top:14px;display:grid;gap:8px}.factor{display:grid;grid-template-columns:1.3fr 70px 44px 70px 2fr;gap:10px;align-items:center;padding:12px;border-radius:14px;background:rgba(255,255,255,.035);border:1px solid var(--line);font-size:13px}.factor.head{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em;background:transparent;border:0;padding-bottom:4px}.sign{width:30px;height:30px;border-radius:10px;display:grid;place-items:center;font-weight:900;background:rgba(255,255,255,.06)}.sign.plus{color:var(--mint);background:rgba(79,224,168,.09)}.sign.minus{color:var(--red);background:rgba(239,68,68,.09)}.sign.equal{color:var(--yellow);background:rgba(250,204,21,.09)}
    .sat-layout{display:grid;grid-template-columns:300px 1fr;gap:18px}.field{margin-bottom:13px}.field label{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}select,input{width:100%;background:rgba(255,255,255,.055);border:1px solid var(--line);border-radius:13px;padding:12px;outline:none;transition:.2s var(--ease)}select:focus,input:focus{border-color:rgba(79,224,168,.44);box-shadow:0 0 0 3px rgba(79,224,168,.08)}.inline{display:grid;grid-template-columns:1fr 1fr;gap:10px}.sat-map{height:430px;border-radius:22px;border:1px solid var(--line);overflow:hidden;position:relative;background:
      radial-gradient(circle at 26% 36%,rgba(241,196,15,.9),transparent 4%),

      radial-gradient(circle at 76% 18%,rgba(79,224,168,.9),transparent 4%),
      linear-gradient(45deg,rgba(55,83,43,.95) 0 12%,rgba(107,125,51,.95) 12% 22%,rgba(28,89,49,.95) 22% 34%,rgba(128,94,42,.95) 34% 44%,rgba(45,117,49,.95) 44% 60%,rgba(175,145,53,.88) 60% 72%,rgba(29,92,61,.9) 72% 100%);box-shadow:inset 0 0 80px rgba(0,0,0,.35)}.sat-map:before{content:"";position:absolute;inset:0;background-image:linear-gradient(30deg,rgba(255,255,255,.12) 1px,transparent 1px),linear-gradient(120deg,rgba(0,0,0,.16) 1px,transparent 1px);background-size:76px 44px,120px 82px;mix-blend-mode:overlay}.sat-map:after{content:"Powered by NASA";position:absolute;top:16px;right:16px;border-radius:999px;background:rgba(5,8,10,.55);border:1px solid rgba(255,255,255,.12);padding:8px 12px;font-weight:800;font-size:12px}.pin{position:absolute;left:50%;top:50%;transform:translate(-50%,-100%);font-size:44px;text-shadow:0 8px 20px rgba(0,0,0,.45)}.legend{position:absolute;left:18px;right:18px;bottom:18px;padding:13px;border-radius:18px;background:rgba(5,8,10,.72);border:1px solid var(--line);backdrop-filter:blur(18px)}.scale{height:10px;border-radius:999px;background:linear-gradient(90deg,#ef4444,#facc15,#4FE0A8,#148f62);margin-top:8px}.ndvi-panel{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:14px}.ndvi-box{padding:15px;border-radius:17px;background:rgba(255,255,255,.035);border:1px solid var(--line)}.ndvi-box b{font-size:28px;letter-spacing:-.05em}.ndvi-box small{display:block;color:var(--muted);margin-top:5px}.heatmap{display:grid;grid-template-columns:130px repeat(7,1fr);gap:6px;align-items:center}.hm-cell{height:42px;border-radius:10px;display:grid;place-items:center;font-size:11px;font-weight:800;border:1px solid rgba(255,255,255,.08)}.hm-label{color:var(--sub);font-size:12px;text-align:right;padding-right:7px}.hm-head{color:var(--muted);font-size:10px;text-align:center}.rupture{padding:16px;border-radius:18px;border:1px solid rgba(239,68,68,.18);background:linear-gradient(135deg,rgba(239,68,68,.10),rgba(255,255,255,.025));display:flex;gap:14px;align-items:flex-start}.sim{display:grid;grid-template-columns:1.1fr .9fr;gap:18px}.sliders{display:grid;gap:16px}.range-row label{display:flex;justify-content:space-between;color:var(--sub);font-size:13px;margin-bottom:8px}.range-row input[type=range]{padding:0;height:8px;accent-color:var(--mint)}.impact{display:grid;place-items:center;text-align:center;min-height:270px;border-radius:22px;background:radial-gradient(circle at 50% 35%,rgba(79,224,168,.18),transparent 55%),rgba(255,255,255,.035);border:1px solid var(--line)}.impact .big{font-size:66px;font-weight:950;letter-spacing:-.07em;color:var(--mint)}.thermo{height:220px;border-radius:26px;background:linear-gradient(90deg,#ef4444 0 18%,#fb923c 18% 36%,#facc15 36% 55%,#4FE0A8 55% 78%,#22c55e 78%);position:relative;overflow:hidden;border:1px solid var(--line)}.thermo:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.18),transparent 35%,rgba(0,0,0,.25))}.needle{position:absolute;top:0;bottom:0;width:4px;background:#fff;left:var(--left);box-shadow:0 0 20px rgba(255,255,255,.8)}.needle:after{content:"";position:absolute;top:50%;left:50%;width:26px;height:26px;background:#fff;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 12px 30px rgba(0,0,0,.35)}.tabs{display:flex;gap:8px;border-bottom:1px solid var(--line);margin-bottom:16px}.tabs button{border:0;background:transparent;padding:12px 10px;color:var(--muted);cursor:pointer;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.07em;border-bottom:2px solid transparent}.tabs button.active{color:var(--mint);border-color:var(--mint)}.report-box{line-height:1.55;color:var(--sub)}.report-box h3{color:#fff;margin:0 0 10px}.report-box ul{margin:10px 0 0;padding-left:18px}.report-box li{margin:7px 0}.mobilebar{display:none;position:fixed;left:12px;right:12px;bottom:12px;z-index:50;border:1px solid var(--line);background:rgba(8,12,14,.86);backdrop-filter:blur(22px);border-radius:22px;padding:8px;box-shadow:var(--shadow)}.mobilebar button{flex:1;border:0;background:transparent;color:var(--muted);padding:10px 6px;border-radius:16px;display:grid;place-items:center;gap:4px;font-size:10px}.mobilebar button.active{background:rgba(79,224,168,.12);color:#fff}.tiny{font-size:12px;color:var(--muted)}.divider{height:1px;background:var(--line);margin:16px 0}.toast{position:fixed;right:20px;bottom:20px;padding:14px 16px;border-radius:18px;background:rgba(12,18,21,.92);border:1px solid rgba(79,224,168,.24);box-shadow:var(--shadow);z-index:60;display:none}.toast.show{display:block;animation:slide .25s var(--ease)}@keyframes slide{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
    .login-overlay{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(900px 600px at 50% 0%,rgba(79,224,168,.16),transparent 58%),rgba(4,7,8,.72);backdrop-filter:blur(12px);z-index:100}.login{width:min(480px,92vw);border:1px solid rgba(255,255,255,.12);border-radius:30px;background:linear-gradient(180deg,rgba(16,23,27,.93),rgba(8,12,14,.93));padding:28px;box-shadow:var(--shadow)}.login h2{font-family:"Space Grotesk";font-size:34px;letter-spacing:-.055em;margin:18px 0 8px}.login p{color:var(--muted);line-height:1.55}.login .auths{display:grid;gap:10px;margin-top:20px}.auth-btn{height:50px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.055);display:flex;align-items:center;justify-content:center;gap:10px;font-weight:800;cursor:pointer}.auth-btn:hover{border-color:rgba(79,224,168,.3)}
    @media(max-width:1180px){.grid.hero{grid-template-columns:1fr}.grid.cols-4{grid-template-columns:repeat(2,1fr)}.mini-cards{grid-template-columns:repeat(2,1fr)}.score-layout,.sat-layout,.sim{grid-template-columns:1fr}.sat-map{height:360px}.factor{grid-template-columns:1fr 54px 40px 54px}.factor .expl{grid-column:1/-1}.heatmap{grid-template-columns:100px repeat(7,1fr)}}

<body>
  <div id="boot" class="boot">
    <div class="boot-card">
      <div class="boot-logo">AR</div>
      <h1>AgRadar está cargando</h1>
      <p>Inicializando React, Chart.js y fuentes públicas.</p>
      <div class="boot-note">Esta versión no usa Babel para ejecutar la app, por eso es más robusta en Safari y GitHub Pages.</div>
      <div class="dots"><i></i><i></i><i></i></div>
    </div>
  </div>
  <div id="app"></div>

  <script defer src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.7/babel.min.js"></script>
  <script>
  (function(){
    const appState = {
      bootTimer:null,
      safeStore:{
        get(k,fallback){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fallback}catch(e){return fallback}},
        set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
      }
    };

    function fallbackError(message){
      const boot=document.getElementById('boot');
      if(!boot) return;
      boot.innerHTML='<div class="boot-card"><div class="boot-logo">AR</div><h1>No cargó la app</h1><p>'+message+'</p><div class="boot-note">Probá refrescar. Si estás en GitHub Pages y sigue igual, el CDN de React/Chart.js fue bloqueado por el navegador o la red.</div></div>';
    }
    window.addEventListener('error',function(ev){
      const msg=(ev && ev.message) ? ev.message : 'Error de JavaScript no identificado.';
      console.warn('AgRadar error:',msg);
    });

    function waitForLibs(){
      if(window.React && window.ReactDOM){
        clearTimeout(appState.bootTimer);
        startApp();
      } else {
        appState.bootTimer=setTimeout(function(){fallbackError('React no terminó de cargar desde CDN. Abrilo desde Safari/Chrome con conexión estable o recargá la página.');},9000);
        setTimeout(waitForLibs,80);
      }
    }
